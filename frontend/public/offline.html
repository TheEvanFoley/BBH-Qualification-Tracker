<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f2c46" />
    <title>BBH Tracker Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1722;
        --ink: #f7f4ea;
        --muted: #c2cfdb;
        --accent: #e5bb15;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background:
          radial-gradient(circle at top left, rgba(229, 187, 21, 0.24), transparent 30%),
          radial-gradient(circle at top right, rgba(100, 139, 58, 0.2), transparent 25%),
          linear-gradient(180deg, #08131d 0%, #0f2c46 58%, #0a1723 100%);
        color: var(--ink);
        font-family: "Segoe UI", Inter, system-ui, sans-serif;
      }

      main {
        width: min(34rem, 100%);
        padding: 1.5rem;
        border-radius: 1.5rem;
        background: rgba(9, 21, 33, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }

      p {
        line-height: 1.6;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.75rem;
      }

      h1 {
        margin: 0.5rem 0 1rem;
        line-height: 1.05;
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">BBH-Qualification-Tracker</p>
      <h1>You're offline right now.</h1>
      <p>
        The app shell is installed, but live player lookups and leaderboard refreshes still need
        the hosted tracker to be reachable.
      </p>
      <p class="muted">
        Reconnect to the internet and reopen the app to get fresh player search and trek data.
      </p>
    </main>
  </body>
</html>
